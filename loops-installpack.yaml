- name: installing packages
  hosts: web  
  become: yes
  tasks:
  - name: install packages 
    ansible.builtin.package:
      name: "{{ item.name }}" 
      state: "{{ item.state }}"
    loop:
    - { name: 'git', state: 'present'}
    - { name: 'mysql', state: 'remove'}
    - { name: 'gcc', state: 'present'}
    - { name: 'zip', state: 'present'}