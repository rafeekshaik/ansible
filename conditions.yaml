- name: install nginix
  hosts: web  
  tasks:
  - name: installing nginix if rhel
 
    ansible.builtin.dnf:
       name: nginix 
       state: installed
    when: ansible_os_family == "RedHat"   

  - name: install nginix if ubuntu
    ansible.builtin.apt:
        name: nginx
        state: installed  
    when: ansible_os_family == "Debian"